version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kitchen-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: kitchen_validator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kitchen-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kitchen-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kitchen_validator
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      AGENT_API_URL: http://agent:8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kitchen-network

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: kitchen-agent
    environment:
      # Use an environment variable for the LLM API key
      # GEMINI_API_KEY: your_api_key_here
      BACKEND_ENDPOINT: http://backend:8080
    ports:
      - "8000:8000"
    networks:
      - kitchen-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kitchen-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - kitchen-network

volumes:
  postgres_data:
    driver: local

networks:
  kitchen-network:
    driver: bridge